name: Survival Receipts
description: Run a local git survival scan and publish Markdown and JSON reports.

inputs:
  as-of:
    description: Optional report cutoff date or timestamp. Defaults to the current time.
    required: false
    default: ""
  survival-days:
    description: Comma-separated survival checkpoints, such as 30 or 1,7,15,30.
    required: true
    default: "30"
  window-days:
    description: Include this many days of mature changes.
    required: true
    default: "30"
  limit:
    description: Max commits to inspect.
    required: false
    default: "250"
  config:
    description: Optional path to survival.config.json, relative to the checked-out repo unless absolute.
    required: false
    default: ""
  max-files:
    description: Skip changes touching more included files than this.
    required: false
    default: "25"
  max-added-lines:
    description: Skip changes adding more included lines than this.
    required: false
    default: "1500"
  max-file-added-lines:
    description: Skip changes when one included file adds more lines than this.
    required: false
    default: "300"
  blame-timeout-ms:
    description: Timeout for each git blame call.
    required: false
    default: "15000"
  copy-detection:
    description: Use slower git blame copy detection.
    required: false
    default: "false"
  quiet:
    description: Suppress scanner progress logs.
    required: false
    default: "false"
  upload-artifact:
    description: Upload the generated reports as a GitHub Actions artifact.
    required: false
    default: "true"
  artifact-name:
    description: Name for the uploaded report artifact.
    required: false
    default: survival-receipts
  upload-url:
    description: Optional backend URL that receives the report envelope with HTTP POST.
    required: false
    default: ""
  cursor-mode:
    description: Use backend cursor state to scan all newly mature commits since the last processed commit.
    required: false
    default: "false"
  cursor-url:
    description: Optional backend cursor URL. Defaults to upload-url with /api/runs replaced by /api/cursor.
    required: false
    default: ""
  api-key:
    description: Optional backend API key. Required when upload-url or cursor-mode is set.
    required: false
    default: ""

outputs:
  markdown-path:
    description: Path to the generated Markdown report on the runner.
    value: ${{ steps.scan.outputs.markdown-path }}
  json-path:
    description: Path to the generated JSON report on the runner.
    value: ${{ steps.scan.outputs.json-path }}
  report-dir:
    description: Directory containing generated reports on the runner.
    value: ${{ steps.scan.outputs.report-dir }}
  artifact-url:
    description: URL for the uploaded report artifact when upload-artifact is true.
    value: ${{ steps.upload.outputs.artifact-url }}
  skipped:
    description: Whether the scan was skipped because no new mature commits were available.
    value: ${{ steps.scan.outputs.skipped }}

runs:
  using: composite
  steps:
    - name: Prepare pnpm
      shell: bash
      run: |
        set -euo pipefail
        corepack enable
        corepack prepare pnpm@11.5.3 --activate
        pnpm --version

    - name: Install action dependencies
      shell: bash
      run: |
        set -euo pipefail
        pnpm install --frozen-lockfile --dir "$GITHUB_ACTION_PATH"

    - name: Run survival scan
      id: scan
      shell: bash
      env:
        INPUT_AS_OF: ${{ inputs.as-of }}
        INPUT_SURVIVAL_DAYS: ${{ inputs.survival-days }}
        INPUT_WINDOW_DAYS: ${{ inputs.window-days }}
        INPUT_LIMIT: ${{ inputs.limit }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_MAX_FILES: ${{ inputs.max-files }}
        INPUT_MAX_ADDED_LINES: ${{ inputs.max-added-lines }}
        INPUT_MAX_FILE_ADDED_LINES: ${{ inputs.max-file-added-lines }}
        INPUT_BLAME_TIMEOUT_MS: ${{ inputs.blame-timeout-ms }}
        INPUT_COPY_DETECTION: ${{ inputs.copy-detection }}
        INPUT_QUIET: ${{ inputs.quiet }}
        INPUT_UPLOAD_URL: ${{ inputs.upload-url }}
        INPUT_CURSOR_MODE: ${{ inputs.cursor-mode }}
        INPUT_CURSOR_URL: ${{ inputs.cursor-url }}
        INPUT_API_KEY: ${{ inputs.api-key }}
      run: |
        set -euo pipefail

        REPORT_DIR="$RUNNER_TEMP/survival-receipts"
        MARKDOWN_FILE="$REPORT_DIR/survival-report.md"
        JSON_FILE="$REPORT_DIR/survival-report.json"
        UPLOAD_FILE="$REPORT_DIR/upload.json"

        rm -rf "$REPORT_DIR"
        mkdir -p "$REPORT_DIR"

        if [ "$(git -C "$GITHUB_WORKSPACE" rev-parse --is-shallow-repository)" = "true" ]; then
          echo "::notice::Repository checkout is shallow. Fetching full history for survival scoring."
          git -C "$GITHUB_WORKSPACE" fetch --prune --unshallow
        fi

        AS_OF="$INPUT_AS_OF"
        if [ -z "$AS_OF" ]; then
          AS_OF="$(node -e 'process.stdout.write(new Date().toISOString())')"
        fi

        CURSOR_URL="$INPUT_CURSOR_URL"
        if [ "$INPUT_CURSOR_MODE" = "true" ]; then
          if [ -z "$INPUT_UPLOAD_URL" ] || [ -z "$INPUT_API_KEY" ]; then
            echo "::error::cursor-mode requires upload-url and api-key"
            exit 1
          fi

          if [ -z "$CURSOR_URL" ]; then
            if [[ "$INPUT_UPLOAD_URL" == */api/runs ]]; then
              CURSOR_URL="${INPUT_UPLOAD_URL%/api/runs}/api/cursor"
            else
              echo "::error::cursor-mode requires cursor-url when upload-url does not end with /api/runs"
              exit 1
            fi
          fi
        fi

        ARGS=(
          scan
          --repo "$GITHUB_WORKSPACE"
          --survival-days "$INPUT_SURVIVAL_DAYS"
          --window-days "$INPUT_WINDOW_DAYS"
          --limit "$INPUT_LIMIT"
          --max-files "$INPUT_MAX_FILES"
          --max-added-lines "$INPUT_MAX_ADDED_LINES"
          --max-file-added-lines "$INPUT_MAX_FILE_ADDED_LINES"
          --blame-timeout-ms "$INPUT_BLAME_TIMEOUT_MS"
          --out "$MARKDOWN_FILE"
          --json-out "$JSON_FILE"
        )

        if [ -n "$AS_OF" ]; then
          ARGS+=(--as-of "$AS_OF")
        fi

        if [ -n "$INPUT_CONFIG" ]; then
          CONFIG_PATH="$INPUT_CONFIG"
          if [[ "$CONFIG_PATH" != /* ]]; then
            CONFIG_PATH="$GITHUB_WORKSPACE/$CONFIG_PATH"
          fi
          ARGS+=(--config "$CONFIG_PATH")
        fi

        if [ "$INPUT_COPY_DETECTION" = "true" ]; then
          ARGS+=(--copy-detection)
        fi

        if [ "$INPUT_QUIET" = "true" ]; then
          ARGS+=(--quiet)
        fi

        SKIPPED="false"

        if [ "$INPUT_CURSOR_MODE" = "true" ]; then
          MAX_SURVIVAL_DAYS="$(
            node -e 'const days=process.argv[1].split(",").map((part)=>Number.parseInt(part.trim(),10)).filter(Number.isFinite); if (days.length === 0) process.exit(1); process.stdout.write(String(Math.max(...days)));' "$INPUT_SURVIVAL_DAYS"
          )"
          MATURE_CUTOFF="$(
            node -e 'const date=new Date(process.argv[1]); date.setUTCDate(date.getUTCDate()-Number(process.argv[2])); process.stdout.write(date.toISOString());' "$AS_OF" "$MAX_SURVIVAL_DAYS"
          )"
          MATURE_HEAD="$(
            git -C "$GITHUB_WORKSPACE" rev-list -n 1 --before="$MATURE_CUTOFF" HEAD || true
          )"

          if [ -z "$MATURE_HEAD" ]; then
            SKIPPED="true"
            {
              echo "# Survival receipt report"
              echo
              echo "No mature commits were available before $MATURE_CUTOFF."
            } > "$MARKDOWN_FILE"
            printf '{"skipped":true,"reason":"no mature commits","matureCutoff":"%s"}\n' "$MATURE_CUTOFF" > "$JSON_FILE"
          else
            CURSOR_REQUEST="$REPORT_DIR/cursor-request.json"
            CURSOR_RESPONSE="$REPORT_DIR/cursor-response.json"
            node -e 'const fs=require("node:fs"); const [owner, repo]=(process.env.GITHUB_REPOSITORY || "/").split("/"); const repositoryId=process.env.GITHUB_REPOSITORY_ID ? Number(process.env.GITHUB_REPOSITORY_ID) : undefined; const body={github:{owner,repo,repository:process.env.GITHUB_REPOSITORY,repositoryId},survivalDays:process.env.INPUT_SURVIVAL_DAYS.split(",").map((part)=>Number.parseInt(part.trim(),10)).filter(Number.isFinite)}; fs.writeFileSync(process.argv[1], JSON.stringify(body));' "$CURSOR_REQUEST"
            curl -fsS \
              -X POST \
              -H "authorization: Bearer $INPUT_API_KEY" \
              -H "content-type: application/json" \
              --data-binary @"$CURSOR_REQUEST" \
              -o "$CURSOR_RESPONSE" \
              "$CURSOR_URL"
            LAST_PROCESSED_SHA="$(
              node -e 'const fs=require("node:fs"); const data=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); process.stdout.write(data.latestProcessedSha || "");' "$CURSOR_RESPONSE"
            )"

            if [ -n "$LAST_PROCESSED_SHA" ]; then
              if [ "$LAST_PROCESSED_SHA" = "$MATURE_HEAD" ]; then
                SKIPPED="true"
                {
                  echo "# Survival receipt report"
                  echo
                  echo "No newly mature commits to scan."
                  echo
                  echo "- Latest processed commit: $LAST_PROCESSED_SHA"
                  echo "- Mature head: $MATURE_HEAD"
                } > "$MARKDOWN_FILE"
                printf '{"skipped":true,"reason":"no newly mature commits","latestProcessedSha":"%s","matureHeadSha":"%s"}\n' "$LAST_PROCESSED_SHA" "$MATURE_HEAD" > "$JSON_FILE"
              elif git -C "$GITHUB_WORKSPACE" merge-base --is-ancestor "$LAST_PROCESSED_SHA" "$MATURE_HEAD"; then
                ARGS+=(--from-commit "$LAST_PROCESSED_SHA")
              else
                echo "::error::Backend cursor $LAST_PROCESSED_SHA is not an ancestor of mature head $MATURE_HEAD. Reset the backend cursor or check the workflow branch."
                exit 1
              fi
            fi

            if [ "$SKIPPED" != "true" ]; then
              ARGS+=(--to-commit "$MATURE_HEAD")
            fi
          fi
        fi

        if [ "$SKIPPED" != "true" ]; then
          pnpm --dir "$GITHUB_ACTION_PATH" survival "${ARGS[@]}"
        fi

        if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          cat "$MARKDOWN_FILE" >> "$GITHUB_STEP_SUMMARY"
        fi

        if [ -n "$INPUT_UPLOAD_URL" ] && [ "$SKIPPED" != "true" ]; then
          if [ -z "$INPUT_API_KEY" ]; then
            echo "::error::upload-url requires api-key"
            exit 1
          fi

          node -e 'const fs=require("node:fs"); const report=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); const [owner, repo]=(process.env.GITHUB_REPOSITORY || "/").split("/"); const repositoryId=process.env.GITHUB_REPOSITORY_ID ? Number(process.env.GITHUB_REPOSITORY_ID) : undefined; const body={schemaVersion:"survival.run.v1",source:"github_action",github:{owner,repo,repository:process.env.GITHUB_REPOSITORY,repositoryId,workflowRunId:process.env.GITHUB_RUN_ID,workflowSha:process.env.GITHUB_SHA,actor:process.env.GITHUB_ACTOR},report}; fs.writeFileSync(process.argv[2], JSON.stringify(body));' "$JSON_FILE" "$UPLOAD_FILE"

          curl -fsS \
            -X POST \
            -H "authorization: Bearer $INPUT_API_KEY" \
            -H "content-type: application/json" \
            --data-binary @"$UPLOAD_FILE" \
            "$INPUT_UPLOAD_URL"
        fi

        {
          echo "markdown-path=$MARKDOWN_FILE"
          echo "json-path=$JSON_FILE"
          echo "report-dir=$REPORT_DIR"
          echo "skipped=$SKIPPED"
        } >> "$GITHUB_OUTPUT"

    - name: Upload survival reports
      id: upload
      if: ${{ inputs.upload-artifact == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ steps.scan.outputs.report-dir }}
